worker_processes auto;
events { worker_connections 4096; }

http {
    # --- ID extraction from URLs ---
    map $request_uri $stock_resource_id {
        ~^/stock/(?:find|add|subtract)/(?P<id>[^/]+)  $id;
        default  $request_id;
    }
    map $request_uri $payment_resource_id {
        ~^/payment/(?:find_user|add_funds|pay)/(?P<id>[^/]+)  $id;
        default  $request_id;
    }
    map $request_uri $order_resource_id {
        ~^/orders/(?:find|checkout)/(?P<id>[^/]+)  $id;
        ~^/orders/addItem/(?P<id>[^/]+)/           $id;
        default  $request_id;
    }

    # --- Suffix extraction for mirror locations ---
    map $request_uri $stock_suffix  { ~^/stock/(.*)$   /$1; default /; }
    map $request_uri $payment_suffix { ~^/payment/(.*)$ /$1; default /; }
    map $request_uri $orders_suffix  { ~^/orders/(.*)$  /$1; default /; }

    # --- Hash-routed upstreams ---
    upstream stock-app {
        hash $stock_resource_id;
        server stock-service-0:5000;
        server stock-service-1:5000;
        server stock-service-2:5000;
        server stock-service-3:5000;
        server stock-service-4:5000;
        server stock-service-5:5000;
        server stock-service-6:5000;
        server stock-service-7:5000;
        server stock-service-8:5000;
        server stock-service-9:5000;
    }
    upstream payment-app {
        hash $payment_resource_id;
        server payment-service-0:5000;
        server payment-service-1:5000;
        server payment-service-2:5000;
        server payment-service-3:5000;
        server payment-service-4:5000;
        server payment-service-5:5000;
        server payment-service-6:5000;
        server payment-service-7:5000;
        server payment-service-8:5000;
        server payment-service-9:5000;
    }
    upstream order-app {
        hash $order_resource_id;
        server order-service-0:5000;
        server order-service-1:5000;
        server order-service-2:5000;
        server order-service-3:5000;
        server order-service-4:5000;
        server order-service-5:5000;
        server order-service-6:5000;
        server order-service-7:5000;
        server order-service-8:5000;
        server order-service-9:5000;
    }

    server {
        listen 80;
        mirror_request_body on;
        resolver 127.0.0.11 valid=30s;  # Docker embedded DNS

        # --- stock batch_init ---
        location ~ ^/stock/batch_init/ {
            mirror /_mirror_stock_1;
            mirror /_mirror_stock_2;
            mirror /_mirror_stock_3;
            mirror /_mirror_stock_4;
            mirror /_mirror_stock_5;
            mirror /_mirror_stock_6;
            mirror /_mirror_stock_7;
            mirror /_mirror_stock_8;
            mirror /_mirror_stock_9;
            rewrite ^/stock/(.*) /$1 break;
            proxy_pass http://stock-service-0:5000;
        }
        location /_mirror_stock_1 { internal; proxy_pass http://stock-service-1:5000$stock_suffix; }
        location /_mirror_stock_2 { internal; proxy_pass http://stock-service-2:5000$stock_suffix; }
        location /_mirror_stock_3 { internal; proxy_pass http://stock-service-3:5000$stock_suffix; }
        location /_mirror_stock_4 { internal; proxy_pass http://stock-service-4:5000$stock_suffix; }
        location /_mirror_stock_5 { internal; proxy_pass http://stock-service-5:5000$stock_suffix; }
        location /_mirror_stock_6 { internal; proxy_pass http://stock-service-6:5000$stock_suffix; }
        location /_mirror_stock_7 { internal; proxy_pass http://stock-service-7:5000$stock_suffix; }
        location /_mirror_stock_8 { internal; proxy_pass http://stock-service-8:5000$stock_suffix; }
        location /_mirror_stock_9 { internal; proxy_pass http://stock-service-9:5000$stock_suffix; }

        # --- payment batch_init ---
        location ~ ^/payment/batch_init/ {
            mirror /_mirror_payment_1;
            mirror /_mirror_payment_2;
            mirror /_mirror_payment_3;
            mirror /_mirror_payment_4;
            mirror /_mirror_payment_5;
            mirror /_mirror_payment_6;
            mirror /_mirror_payment_7;
            mirror /_mirror_payment_8;
            mirror /_mirror_payment_9;
            rewrite ^/payment/(.*) /$1 break;
            proxy_pass http://payment-service-0:5000;
        }
        location /_mirror_payment_1 { internal; proxy_pass http://payment-service-1:5000$payment_suffix; }
        location /_mirror_payment_2 { internal; proxy_pass http://payment-service-2:5000$payment_suffix; }
        location /_mirror_payment_3 { internal; proxy_pass http://payment-service-3:5000$payment_suffix; }
        location /_mirror_payment_4 { internal; proxy_pass http://payment-service-4:5000$payment_suffix; }
        location /_mirror_payment_5 { internal; proxy_pass http://payment-service-5:5000$payment_suffix; }
        location /_mirror_payment_6 { internal; proxy_pass http://payment-service-6:5000$payment_suffix; }
        location /_mirror_payment_7 { internal; proxy_pass http://payment-service-7:5000$payment_suffix; }
        location /_mirror_payment_8 { internal; proxy_pass http://payment-service-8:5000$payment_suffix; }
        location /_mirror_payment_9 { internal; proxy_pass http://payment-service-9:5000$payment_suffix; }

        # --- order batch_init ---
        location ~ ^/orders/batch_init/ {
            mirror /_mirror_order_1;
            mirror /_mirror_order_2;
            mirror /_mirror_order_3;
            mirror /_mirror_order_4;
            mirror /_mirror_order_5;
            mirror /_mirror_order_6;
            mirror /_mirror_order_7;
            mirror /_mirror_order_8;
            mirror /_mirror_order_9;
            rewrite ^/orders/(.*) /$1 break;
            proxy_pass http://order-service-0:5000;
        }
        location /_mirror_order_1 { internal; proxy_pass http://order-service-1:5000$orders_suffix; }
        location /_mirror_order_2 { internal; proxy_pass http://order-service-2:5000$orders_suffix; }
        location /_mirror_order_3 { internal; proxy_pass http://order-service-3:5000$orders_suffix; }
        location /_mirror_order_4 { internal; proxy_pass http://order-service-4:5000$orders_suffix; }
        location /_mirror_order_5 { internal; proxy_pass http://order-service-5:5000$orders_suffix; }
        location /_mirror_order_6 { internal; proxy_pass http://order-service-6:5000$orders_suffix; }
        location /_mirror_order_7 { internal; proxy_pass http://order-service-7:5000$orders_suffix; }
        location /_mirror_order_8 { internal; proxy_pass http://order-service-8:5000$orders_suffix; }
        location /_mirror_order_9 { internal; proxy_pass http://order-service-9:5000$orders_suffix; }

        # --- All other endpoints: hash-routed ---
        location /orders/ {
            rewrite ^/orders/(.*) /$1 break;
            proxy_pass http://order-app;
        }
        location /stock/ {
            rewrite ^/stock/(.*) /$1 break;
            proxy_pass http://stock-app;
        }
        location /payment/ {
            rewrite ^/payment/(.*) /$1 break;
            proxy_pass http://payment-app;
        }

        access_log /var/log/nginx/server.access.log;
    }
    access_log /var/log/nginx/access.log;
}
