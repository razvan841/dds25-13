# NodePort service — exposes the gateway on minikube's IP at port 30080.
# Access the system via: $(minikube ip):30080
# Or: minikube service gateway -n dds25 --url
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: dds25
spec:
  type: NodePort
  selector:
    app: gateway
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
