apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-shard-2
  namespace: dds25
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-shard-2
  template:
    metadata:
      labels:
        app: order-shard-2
    spec:
      containers:
        - name: order
          image: order:latest
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              python -m order.reaper_worker &
              exec gunicorn -b 0.0.0.0:5000 -w 2 --timeout 30 --log-level=info app:app
          ports:
            - containerPort: 5000
          env:
            - name: SHARD_INDEX
              value: "2"
            - name: NUM_SHARDS
              value: "3"
            - name: REDIS_HOST
              value: "order-db-2"
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_PASSWORD
              value: "redis"
            - name: REDIS_DB
              value: "0"
            - name: KAFKA_BOOTSTRAP
              value: "kafka-0.kafka-headless:9092,kafka-1.kafka-headless:9092,kafka-2.kafka-headless:9092"
            - name: KAFKA_CLIENT_ID
              value: "order-service-2"
            - name: KAFKA_GROUP_ID
              value: "order-orchestrator-2"
            - name: GATEWAY_URL
              value: "http://gateway:80"
            - name: PYTHONPATH
              value: "/app"
---
apiVersion: v1
kind: Service
metadata:
  name: order-shard-2
  namespace: dds25
spec:
  selector:
    app: order-shard-2
  ports:
    - port: 5000
      targetPort: 5000
