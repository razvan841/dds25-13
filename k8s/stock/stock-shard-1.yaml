apiVersion: apps/v1
kind: Deployment
metadata:
  name: stock-shard-1
  namespace: dds25
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stock-shard-1
  template:
    metadata:
      labels:
        app: stock-shard-1
    spec:
      containers:
        - name: stock
          image: stock:latest
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              python -m stock.worker &
              exec gunicorn -b 0.0.0.0:5000 -w 2 --timeout 30 --log-level=info app:app
          ports:
            - containerPort: 5000
          env:
            - name: SHARD_INDEX
              value: "1"
            - name: NUM_SHARDS
              value: "3"
            - name: REDIS_HOST
              value: "stock-db-1"
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_PASSWORD
              value: "redis"
            - name: REDIS_DB
              value: "0"
            - name: KAFKA_BOOTSTRAP
              value: "kafka-0.kafka-headless:9092,kafka-1.kafka-headless:9092,kafka-2.kafka-headless:9092"
            - name: KAFKA_CLIENT_ID
              value: "stock-service-1"
            - name: KAFKA_GROUP_ID
              value: "stock-service-1"
            - name: LOG_LEVEL
              value: "WARNING"
            - name: PYTHONPATH
              value: "/app"
---
apiVersion: v1
kind: Service
metadata:
  name: stock-shard-1
  namespace: dds25
spec:
  selector:
    app: stock-shard-1
  ports:
    - port: 5000
      targetPort: 5000
