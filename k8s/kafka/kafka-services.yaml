# Headless service — gives each broker a stable DNS name:
#   kafka-0.kafka-headless.dds25.svc.cluster.local
#   kafka-1.kafka-headless.dds25.svc.cluster.local
#   kafka-2.kafka-headless.dds25.svc.cluster.local
# Within the same namespace these resolve as kafka-{N}.kafka-headless
apiVersion: v1
kind: Service
metadata:
  name: kafka-headless
  namespace: dds25
spec:
  clusterIP: None
  # Publish DNS entries even for not-yet-Ready pods.
  # Without this, KRaft bootstrapping deadlocks: pods can't resolve each
  # other's hostnames because none are Ready yet (quorum not formed), but
  # quorum can't form because DNS doesn't resolve.
  publishNotReadyAddresses: true
  selector:
    app: kafka
  ports:
    - name: broker
      port: 9092
      targetPort: 9092
    - name: controller
      port: 9093
      targetPort: 9093
---
# Regular ClusterIP service for clients that don't need pod affinity.
# Named "kafka-bootstrap" (not "kafka") to avoid K8s injecting KAFKA_PORT
# env vars into all pods — which the Confluent image misinterprets as broker config.
apiVersion: v1
kind: Service
metadata:
  name: kafka-bootstrap
  namespace: dds25
spec:
  selector:
    app: kafka
  ports:
    - name: broker
      port: 9092
      targetPort: 9092
