# Creates all per-shard Kafka topics once the brokers are healthy.
# Topics created: payment.commands.{0,1,2}  stock.commands.{0,1,2}
#                 payment.events.{0,1,2}     stock.events.{0,1,2}
#                 order.events.{0,1,2}
# Re-run safely: --if-not-exists prevents errors on duplicate topics.
apiVersion: batch/v1
kind: Job
metadata:
  name: kafka-init
  namespace: dds25
spec:
  backoffLimit: 10
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-kafka
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              until nc -z kafka-0.kafka-headless 9092 && \
                    nc -z kafka-1.kafka-headless 9092 && \
                    nc -z kafka-2.kafka-headless 9092; do
                echo "Waiting for all Kafka brokers..."
                sleep 5
              done
              echo "All brokers reachable, waiting a few more seconds for leader election..."
              sleep 10
      containers:
        - name: init-topics
          image: confluentinc/cp-kafka:7.6.0
          command: ["/bin/bash", "/scripts/init-topics.sh"]
          env:
            - name: TOPICS
              value: "payment.commands,stock.commands,payment.events,stock.events,order.events"
            - name: NUM_SHARDS
              value: "3"
            - name: PARTITIONS
              value: "4"
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "3"
            - name: KAFKA_BOOTSTRAP
              value: "kafka-0.kafka-headless:9092,kafka-1.kafka-headless:9092,kafka-2.kafka-headless:9092"
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: scripts
          configMap:
            name: kafka-init-scripts
            defaultMode: 0755
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-init-scripts
  namespace: dds25
data:
  init-topics.sh: |
    #!/usr/bin/env bash
    set -euo pipefail

    NUM_SHARDS="${NUM_SHARDS:-3}"
    BOOTSTRAP="${KAFKA_BOOTSTRAP:-kafka-0.kafka-headless:9092,kafka-1.kafka-headless:9092,kafka-2.kafka-headless:9092}"

    echo "Initializing Kafka topics for ${NUM_SHARDS} shards..."
    IFS=',' read -ra TOPIC_ARRAY <<< "$TOPICS"

    for topic in "${TOPIC_ARRAY[@]}"; do
      for shard in $(seq 0 $((NUM_SHARDS - 1))); do
        full_topic="${topic}.${shard}"
        kafka-topics --create \
          --topic "$full_topic" \
          --partitions "$PARTITIONS" \
          --replication-factor "$KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR" \
          --if-not-exists \
          --bootstrap-server "$BOOTSTRAP"
        echo "Created topic $full_topic"
      done
    done

    echo "All Kafka topics created successfully (${NUM_SHARDS} shards)."
