apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: stock-db-2-pvc
  namespace: dds25
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 512Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stock-db-2
  namespace: dds25
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stock-db-2
  template:
    metadata:
      labels:
        app: stock-db-2
    spec:
      containers:
        - name: redis
          image: redis:7.2-bookworm
          args: ["--requirepass", "redis", "--maxmemory", "512mb", "--appendonly", "yes"]
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: stock-db-2-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: stock-db-2
  namespace: dds25
spec:
  selector:
    app: stock-db-2
  ports:
    - port: 6379
      targetPort: 6379
