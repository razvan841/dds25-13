version: "3"

x-stock-base: &stock-base
  image: stock:latest
  restart: always
  command: gunicorn -c gunicorn_conf.py -b 0.0.0.0:5000 -w 4 --worker-class gevent --worker-connections 1000 --timeout 30 --log-level=info app:app
  env_file: [ env/saga_redis.env ]
  deploy:
    resources:
      limits:
        cpus: "2.0"

x-payment-base: &payment-base
  image: payment:latest
  restart: always
  command: gunicorn -c gunicorn_conf.py -b 0.0.0.0:5000 -w 4 --worker-class gevent --worker-connections 1000 --timeout 30 --log-level=info app:app
  env_file: [ env/saga_redis.env ]
  deploy:
    resources:
      limits:
        cpus: "2.0"

x-order-base: &order-base
  image: order:latest
  restart: always
  command: gunicorn -c gunicorn_conf.py -b 0.0.0.0:5000 -w 4 --worker-class gevent --worker-connections 1000 --timeout 30 --log-level=info app:app
  env_file: [ env/saga_redis.env, env/checkout.env ]
  deploy:
    resources:
      limits:
        cpus: "2.5"

x-redis: &redis-base
  image: redis:7.2-bookworm
  restart: always
  command: redis-server --requirepass redis --maxmemory 512mb
  deploy:
    resources:
      limits:
        cpus: "0.5"

services:

  gateway:
    image: nginx:1.25-bookworm
    restart: always
    volumes:
      - ./nginx-large.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8000:80"
    deploy:
      resources:
        limits:
          cpus: "3.0"
    depends_on:
      - order-service-0
      - order-service-1
      - order-service-2
      - order-service-3
      - order-service-4
      - order-service-5
      - order-service-6
      - order-service-7
      - order-service-8
      - order-service-9
      - stock-service-0
      - stock-service-1
