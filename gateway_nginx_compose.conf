# docker-compose gateway config (single-node development)
# Uses plain nginx directives only (no Lua/OpenResty directives).

events { worker_connections 1024; }

http {
    upstream order_backend {
        server order-service:5000;
    }

    upstream payment_backend {
        server payment-service:5000;
    }

    upstream stock_backend {
        server stock-service:5000;
    }

    server {
        listen 80;

        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
        if ($request_method = OPTIONS) { return 204; }

        location /orders/ {
            rewrite ^/orders/(.*)$ /$1 break;
            proxy_pass http://order_backend;
        }

        location /payment/ {
            rewrite ^/payment/(.*)$ /$1 break;
            proxy_pass http://payment_backend;
        }

        location /stock/ {
            rewrite ^/stock/(.*)$ /$1 break;
            proxy_pass http://stock_backend;
        }

        access_log /dev/stdout;
    }
}
