# OpenResty (NGINX + LuaJIT) gateway with shard-based routing.
#
# Each request is routed to the correct service shard by extracting an entity
# ID (user_id, order_id) from the URL and computing:
#   shard = int(uuid_hex[:16], 16) % NUM_SHARDS
# This matches the identical formula in common_kafka/config.py.
#
# If you change NUM_SHARDS you must also add/remove upstream blocks and
# update the Lua routing logic to match.

events { worker_connections 2048; }

http {
    # Shared Lua state: shard count and routing function.
    init_by_lua_block {
        NUM_SHARDS = tonumber(os.getenv("NUM_SHARDS")) or 3

        -- Compute the shard index for a UUID or plain-integer entity ID.
        -- Must match common_kafka/config.py:compute_shard().
        function compute_shard(entity_id)
            -- Strip UUID hyphens, take first 16 hex chars (64 bits)
            local hex = entity_id:gsub("-", "")
            local n = tonumber(hex:sub(1, 16), 16)
            if not n then
                -- Fallback for integer IDs produced by batch_init endpoints
                n = tonumber(entity_id) or 0
            end
            return n % NUM_SHARDS
        end
    }

    # -----------------------------------------------------------------------
    # Named upstreams — one per shard per service type.
    # Update these blocks (and the Lua routing below) when NUM_SHARDS changes.
    # -----------------------------------------------------------------------
    upstream order-shard-0  { server order-shard-0:5000;  }
    upstream order-shard-1  { server order-shard-1:5000;  }
    upstream order-shard-2  { server order-shard-2:5000;  }
    upstream order-any {
        server order-shard-0:5000;
        server order-shard-1:5000;
        server order-shard-2:5000;
    }

    upstream payment-shard-0 { server payment-shard-0:5000; }
    upstream payment-shard-1 { server payment-shard-1:5000; }
    upstream payment-shard-2 { server payment-shard-2:5000; }
    upstream payment-any {
        server payment-shard-0:5000;
        server payment-shard-1:5000;
        server payment-shard-2:5000;
    }

    upstream stock-shard-0  { server stock-shard-0:5000;  }
    upstream stock-shard-1  { server stock-shard-1:5000;  }
    upstream stock-shard-2  { server stock-shard-2:5000;  }
    upstream stock-any {
        server stock-shard-0:5000;
        server stock-shard-1:5000;
        server stock-shard-2:5000;
    }

    server {
        listen 80;

        # CORS headers
        add_header Access-Control-Allow-Origin  * always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
        if ($request_method = OPTIONS) { return 204; }

        # ==================================================================
        # STOCK SERVICE
        # Items are replicated across shards, so reads go to any shard.
        # Use /stock/shard/<N>/... to target a specific shard for batch_init.
        # ==================================================================

        # /stock/shard/<N>/<rest> → stock-shard-N
        location ~ ^/stock/shard/(\d+)/(.*)$ {
            set $stock_upstream "stock-any";
            rewrite_by_lua_block {
                local shard = tonumber(ngx.var[1]) or 0
                ngx.var.stock_upstream = "stock-shard-" .. shard
            }
            rewrite ^/stock/shard/\d+/(.*) /$1 break;
            proxy_pass http://$stock_upstream;
        }

        # All other /stock/* → round-robin across shards
        location /stock/ {
            proxy_pass http://stock-any/;
        }

        # ==================================================================
        # PAYMENT SERVICE
        # User-specific operations are routed by hash(user_id) % NUM_SHARDS.
        # Use /payment/shard/<N>/... to target a specific shard for batch_init.
        # ==================================================================

        # /payment/shard/<N>/<rest> → payment-shard-N
        location ~ ^/payment/shard/(\d+)/(.*)$ {
            set $payment_upstream "payment-any";
            rewrite_by_lua_block {
                local shard = tonumber(ngx.var[1]) or 0
                ngx.var.payment_upstream = "payment-shard-" .. shard
            }
            rewrite ^/payment/shard/\d+/(.*) /$1 break;
            proxy_pass http://$payment_upstream;
        }

        # User-keyed routes: extract user_id (2nd path segment after action)
        location ~ ^/payment/(add_funds|find_user|subtract_funds|pay)/([^/]+) {
            set $payment_upstream "payment-any";
            rewrite_by_lua_block {
                local user_id = ngx.var[2]
                local shard = compute_shard(user_id)
                ngx.var.payment_upstream = "payment-shard-" .. shard
            }
            rewrite ^/payment/(.*) /$1 break;
            proxy_pass http://$payment_upstream;
        }

        # All other /payment/* (create_user, batch_init, health) → round-robin
        location /payment/ {
            proxy_pass http://payment-any/;
        }

        # ==================================================================
        # ORDER SERVICE
        # /orders/create/<user_id>      → hash on user_id (co-locate with payment)
        # /orders/<action>/<order_id>   → hash on order_id
        # /orders/shard/<N>/...         → direct shard access for batch_init
        # All other /orders/*           → round-robin
        # ==================================================================

        # /orders/shard/<N>/<rest> → order-shard-N
        location ~ ^/orders/shard/(\d+)/(.*)$ {
            set $order_upstream "order-any";
            rewrite_by_lua_block {
                local shard = tonumber(ngx.var[1]) or 0
                ngx.var.order_upstream = "order-shard-" .. shard
            }
            rewrite ^/orders/shard/\d+/(.*) /$1 break;
            proxy_pass http://$order_upstream;
        }

        # /orders/create/<user_id> → hash on user_id so order & payment co-locate
        location ~ ^/orders/create/([^/?]+) {
            set $order_upstream "order-any";
            rewrite_by_lua_block {
                local user_id = ngx.var[1]
                local shard = compute_shard(user_id)
                ngx.var.order_upstream = "order-shard-" .. shard
            }
            rewrite ^/orders/(.*) /$1 break;
            proxy_pass http://$order_upstream;
        }

        # Order-keyed routes: checkout, find, addItem, checkout_status
        location ~ ^/orders/(checkout|find|addItem|checkout_status)/([^/?]+) {
            set $order_upstream "order-any";
            rewrite_by_lua_block {
                local order_id = ngx.var[2]
                local shard = compute_shard(order_id)
                ngx.var.order_upstream = "order-shard-" .. shard
            }
            rewrite ^/orders/(.*) /$1 break;
            proxy_pass http://$order_upstream;
        }

        # All other /orders/* (batch_init, health, kafka_ping) → round-robin
        location /orders/ {
            proxy_pass http://order-any/;
        }

        access_log /var/log/nginx/server.access.log;
    }

    access_log /var/log/nginx/access.log;
}
